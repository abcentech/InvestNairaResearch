name: Deploy Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Generate runtime config
        working-directory: .
        run: |
          cat > config.js <<'EOF'
          window.INVESTNAIRA_CONFIG = {
            SUPABASE_URL: '${{ vars.SUPABASE_URL }}',
            SUPABASE_ANON: '${{ secrets.SUPABASE_ANON_KEY }}',
            GHOST_URL: '${{ vars.GHOST_URL }}',
            GHOST_KEY: '${{ secrets.GHOST_CONTENT_API_KEY }}',
            PAY_PREMIUM: '${{ vars.KORAPAY_PREMIUM_URL }}',
            PAY_PROFESSIONAL: '${{ vars.KORAPAY_PROFESSIONAL_URL }}',
            PAY_BUSINESS: '${{ vars.KORAPAY_BUSINESS_URL }}'
          };
          EOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
